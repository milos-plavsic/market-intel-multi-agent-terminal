services:
  app:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python app/main.py"

  api:
    profiles: ["api"]
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.api:app --host 0.0.0.0 --port 8000"
