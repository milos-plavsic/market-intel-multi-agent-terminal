version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - LOG_LEVEL=DEBUG
      - CACHE_TTL_SECONDS=3600
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  tests:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    command: pytest tests/ -v --cov=app
    depends_on:
      app:
        condition: service_healthy
