<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><title>Market Intel Terminal</title>
<style>body{font-family:ui-monospace,monospace;background:#0b1020;color:#d7e0ff;margin:0;padding:1rem}
.panel{border:1px solid #334; border-radius:8px; padding:1rem; margin-bottom:1rem}
input,button{font-size:1rem;padding:0.4rem}</style></head>
<body>
<h1>Market Intel Terminal</h1>
<div class="panel">
<label>Ticker <input id="ticker" value="AAPL"/></label>
<label>Sector <input id="sector" value="technology"/></label>
<button id="run">Run brief</button>
</div>
<pre id="out">{}</pre>
<script>
const b=location.origin.replace(/\/ui\/?$/,'');
document.getElementById('run').onclick=async()=>{
  const body={ticker:document.getElementById('ticker').value,sector:document.getElementById('sector').value};
  const r=await fetch(b+'/v1/brief',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);
};
</script>
</body>
</html>
